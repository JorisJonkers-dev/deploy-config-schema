apiVersion: deployment.jorisjonkers.dev/v2
kind: Deployment
metadata:
  name: assistant-api
spec:
  workloads:
    assistant-api:
      image: ghcr.io/jorisjonkers-dev/assistant-api:v1.2.3
      group: agents
      namespace: agents
      account: assistant-api
      containers:
        - name: assistant-api
          ports:
            - name: http
              containerPort: 8080
      ports:
        - name: http
          containerPort: 8080
      placement:
        site: homelab
        requiredCapabilities:
          - platform
      autoscaling:
        minReplicas: 1
        maxReplicas: 2
      credentials:
        - name: postgres
          claim: data.platform-postgres.assistant-api
          destinationSecret: assistant-api-postgres
      observability:
        metrics:
          - port: http
            path: /actuator/prometheus
        status:
          - name: health
            group: agents
            url: https://agents.example.com/health
            type: http
            conditions:
              - "[STATUS] == 200"
      routes:
        - host: agents.example.com
          expose:
            tier: public-frankfurt
          auth:
            scope: application
          rules:
            - path: /
              port: http
              operation: prefix
      hooks:
        pre:
          - name: migrate-db
      safety:
        gateOn:
          - parity
