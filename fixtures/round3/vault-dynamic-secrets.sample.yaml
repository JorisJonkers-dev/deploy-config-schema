version: 1

vault:
  auth:
    kubernetes:
      mount: kubernetes
      roles:
        api-service:
          bound_service_accounts:
            - name: api-service
              namespace: app-system
          policies:
            - api-service
          audiences:
            - vault
          ttl: 1h
        worker-cron:
          bound_service_accounts:
            - name: worker-cron
              namespace: worker-system
          policies:
            - worker-cron
          ttl: 1h
        vso:
          bound_service_accounts:
            - name: vault-secrets-operator
              namespace: secret-sync-system
          policies:
            - vso-sync
          ttl: 1h

  kv:
    mount: secret
    paths:
      api-kv:
        path: services/api
        owner: api-service
        purpose: Non-dynamic API configuration keys.
        fields:
          - jwt_public_config
          - oauth_client_ref
      mail-kv:
        path: platform/mail
        owner: mail-admin
        purpose: Mail service bootstrap values mirrored by VSO.
        fields:
          - admin_user
          - admin_password
      registry-kv:
        path: platform/registry
        owner: platform
        purpose: Read-only image pull credentials.
        fields:
          - username
          - token
      database-admin:
        path: platform/database
        owner: platform
        purpose: Database admin connection values used by the dynamic credential engine.
        fields:
          - admin_user
          - admin_password

  transit:
    keys:
      api-jwt:
        type: rsa-2048
        allowed_operations:
          - sign
          - verify
          - read_public_key
        rotation_period: 2160h

  database:
    engines:
      app-database:
        plugin: postgresql
        connection:
          url_template: postgres://{{username}}:{{password}}@database.service.internal:5432/postgres?sslmode=disable
          admin_secret_ref: database-admin
          verify_connection: true
        roles:
          api-db-role:
            default_ttl: 72h
            max_ttl: 168h
            grant_parent_role_ref: api-parent-role
            creation_statements:
              - CREATE ROLE "{{name}}" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}' IN ROLE "api_parent" INHERIT;
            revocation_statements:
              - REASSIGN OWNED BY "{{name}}" TO "api_parent"; DROP OWNED BY "{{name}}"; DROP ROLE "{{name}}";
          worker-db-role:
            default_ttl: 24h
            max_ttl: 72h
            grant_parent_role_ref: worker-parent-role
            creation_statements:
              - CREATE ROLE "{{name}}" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}' IN ROLE "worker_parent" INHERIT;
            revocation_statements:
              - REASSIGN OWNED BY "{{name}}" TO "worker_parent"; DROP OWNED BY "{{name}}"; DROP ROLE "{{name}}";

  rabbitmq:
    engines:
      app-broker:
        connection:
          uri: http://broker.service.internal:15672
          admin_secret_ref: mail-kv
          verify_connection: true
        roles:
          app-consumer:
            default_ttl: 72h
            max_ttl: 768h
            vhosts:
              /:
                configure: .*
                write: .*
                read: .*

  vso:
    auth_role: vso
    static_syncs:
      api-runtime:
        kv_path_ref: api-kv
        target:
          namespace: app-system
          name: api-runtime
          type: Opaque
        rollout_restart_targets:
          - kind: Deployment
            namespace: app-system
            name: api-service
      mail-runtime:
        kv_path_ref: mail-kv
        target:
          namespace: messaging-system
          name: mail-runtime
          type: Opaque
      registry-readonly:
        kv_path_ref: registry-kv
        target:
          namespace: app-system
          name: registry-readonly
          type: kubernetes.io/dockerconfigjson
    dynamic_syncs:
      worker-database:
        engine: database
        role: worker-db-role
        target:
          namespace: worker-system
          name: worker-database
          type: Opaque
        rollout_restart_targets:
          - kind: CronJob
            namespace: worker-system
            name: worker-cron

  service_consumers:
    api-service:
      kubernetes_role_ref: api-service
      kv_path_refs:
        - api-kv
      transit_key_refs:
        - api-jwt
      database_role_refs:
        - api-db-role
      rabbitmq_role_refs:
        - app-consumer
      credential_delivery: spring_cloud_vault
    worker-cron:
      kubernetes_role_ref: worker-cron
      database_role_refs:
        - worker-db-role
      credential_delivery: vso_secret

  validation_fixtures:
    required_checks:
      - auth_role_has_policy
      - vso_kv_path_declared
      - database_role_has_ttl
      - rabbitmq_vhost_declared
      - transit_key_declared
      - no_secret_values
    negative_cases:
      - missing-kv-path-for-vso-sync
      - database-role-without-revocation
      - rabbitmq-role-without-vhost
