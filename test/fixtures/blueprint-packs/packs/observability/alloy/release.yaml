apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: "${OBSERVABILITY_ALLOY_RELEASE_NAME}"
  namespace: "${OBSERVABILITY_NAMESPACE}"
spec:
  interval: "${OBSERVABILITY_RELEASE_INTERVAL}"
  chart:
    spec:
      chart: "${OBSERVABILITY_ALLOY_CHART_NAME}"
      version: "${OBSERVABILITY_ALLOY_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: "${OBSERVABILITY_GRAFANA_HELM_REPOSITORY_NAME}"
        namespace: "${OBSERVABILITY_NAMESPACE}"
  values:
    alloy:
      configMap:
        content: |
          otelcol.receiver.otlp "default" {
            grpc { endpoint = "0.0.0.0:${OBSERVABILITY_ALLOY_OTLP_GRPC_PORT}" }
            http {
              endpoint = "0.0.0.0:${OBSERVABILITY_ALLOY_OTLP_HTTP_PORT}"
              cors {
                allowed_origins = [${OBSERVABILITY_ALLOY_ALLOWED_ORIGINS}]
              }
            }
            output {
              traces = [otelcol.processor.batch.default.input]
              metrics = [otelcol.processor.batch.default.input]
              logs = [otelcol.processor.batch.default.input]
            }
          }

          otelcol.processor.batch "default" {
            output {
              traces = [otelcol.exporter.otlphttp.tempo.input]
              metrics = [otelcol.exporter.prometheus.prometheus.input]
              logs = [otelcol.exporter.loki.default.input]
            }
          }

          otelcol.exporter.otlphttp "tempo" {
            client { endpoint = "${OBSERVABILITY_TEMPO_OTLP_HTTP_URL}" }
          }

          otelcol.exporter.prometheus "prometheus" {
            forward_to = [prometheus.remote_write.default.receiver]
          }

          prometheus.remote_write "default" {
            endpoint { url = "${OBSERVABILITY_PROMETHEUS_REMOTE_WRITE_URL}" }
          }

          otelcol.exporter.loki "default" {
            forward_to = [loki.write.default.receiver]
          }

          loki.write "default" {
            endpoint { url = "${OBSERVABILITY_LOKI_PUSH_URL}" }
          }
    controller:
      nodeSelector:
        "${OBSERVABILITY_ALLOY_NODE_SELECTOR_KEY}": "${OBSERVABILITY_ALLOY_NODE_SELECTOR_VALUE}"
