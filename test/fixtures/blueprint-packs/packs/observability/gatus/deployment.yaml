apiVersion: apps/v1
kind: Deployment
metadata:
  name: "${GATUS_DEPLOYMENT_NAME}"
  namespace: "${GATUS_NAMESPACE}"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: "${GATUS_APP_LABEL}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "${GATUS_APP_LABEL}"
    spec:
      nodeSelector:
        "${GATUS_NODE_SELECTOR_KEY}": "${GATUS_NODE_SELECTOR_VALUE}"
      containers:
        - name: gatus
          image: "${GATUS_IMAGE}"
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/config"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "${GATUS_REQUEST_CPU}"
              memory: "${GATUS_REQUEST_MEMORY}"
            limits:
              memory: "${GATUS_LIMIT_MEMORY}"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
            - name: endpoints
              mountPath: /config/endpoints.yaml
              subPath: endpoints.yaml
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: "${GATUS_PVC_NAME}"
        - name: config
          configMap:
            name: "${GATUS_CONFIG_CONFIGMAP_NAME}"
        - name: endpoints
          configMap:
            name: "${GATUS_ENDPOINTS_CONFIGMAP_NAME}"
