apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: "${OBSERVABILITY_LOKI_RELEASE_NAME}"
  namespace: "${OBSERVABILITY_NAMESPACE}"
spec:
  interval: "${OBSERVABILITY_RELEASE_INTERVAL}"
  chart:
    spec:
      chart: "${OBSERVABILITY_LOKI_CHART_NAME}"
      version: "${OBSERVABILITY_LOKI_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: "${OBSERVABILITY_GRAFANA_HELM_REPOSITORY_NAME}"
        namespace: "${OBSERVABILITY_NAMESPACE}"
  values:
    deploymentMode: SingleBinary
    loki:
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "${OBSERVABILITY_LOKI_SCHEMA_FROM}"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: "${OBSERVABILITY_LOKI_STORAGE_CLASS}"
        size: "${OBSERVABILITY_LOKI_STORAGE_SIZE}"
      nodeSelector:
        "${OBSERVABILITY_LOGS_NODE_SELECTOR_KEY}": "${OBSERVABILITY_LOGS_NODE_SELECTOR_VALUE}"
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
