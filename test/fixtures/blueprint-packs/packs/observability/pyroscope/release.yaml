apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: "${OBSERVABILITY_PYROSCOPE_RELEASE_NAME}"
  namespace: "${OBSERVABILITY_NAMESPACE}"
spec:
  interval: "${OBSERVABILITY_RELEASE_INTERVAL}"
  chart:
    spec:
      chart: "${OBSERVABILITY_PYROSCOPE_CHART_NAME}"
      version: "${OBSERVABILITY_PYROSCOPE_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: "${OBSERVABILITY_GRAFANA_HELM_REPOSITORY_NAME}"
        namespace: "${OBSERVABILITY_NAMESPACE}"
  values:
    pyroscope:
      persistence:
        enabled: true
        size: "${OBSERVABILITY_PYROSCOPE_STORAGE_SIZE}"
        storageClassName: "${OBSERVABILITY_PYROSCOPE_STORAGE_CLASS}"
