apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: "${OBSERVABILITY_GRAFANA_OPERATOR_RELEASE_NAME}"
  namespace: "${OBSERVABILITY_NAMESPACE}"
spec:
  interval: "${OBSERVABILITY_RELEASE_INTERVAL}"
  chart:
    spec:
      chart: "${OBSERVABILITY_GRAFANA_OPERATOR_CHART_NAME}"
      version: "${OBSERVABILITY_GRAFANA_OPERATOR_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: "${OBSERVABILITY_GRAFANA_HELM_REPOSITORY_NAME}"
        namespace: "${OBSERVABILITY_NAMESPACE}"
