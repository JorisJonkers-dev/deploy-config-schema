apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: "${OBSERVABILITY_DCGM_RELEASE_NAME}"
  namespace: "${OBSERVABILITY_NAMESPACE}"
spec:
  interval: "${OBSERVABILITY_RELEASE_INTERVAL}"
  chart:
    spec:
      chart: "${OBSERVABILITY_DCGM_CHART_NAME}"
      version: "${OBSERVABILITY_DCGM_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: "${OBSERVABILITY_DCGM_HELM_REPOSITORY_NAME}"
        namespace: "${OBSERVABILITY_NAMESPACE}"
  values:
    nodeSelector:
      "${OBSERVABILITY_DCGM_NODE_SELECTOR_KEY}": "${OBSERVABILITY_DCGM_NODE_SELECTOR_VALUE}"
