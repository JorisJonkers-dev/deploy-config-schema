apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: "${OBSERVABILITY_METRICS_RELEASE_NAME}"
  namespace: "${OBSERVABILITY_NAMESPACE}"
spec:
  interval: "${OBSERVABILITY_RELEASE_INTERVAL}"
  chart:
    spec:
      chart: "${OBSERVABILITY_METRICS_CHART_NAME}"
      version: "${OBSERVABILITY_METRICS_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: "${OBSERVABILITY_PROMETHEUS_HELM_REPOSITORY_NAME}"
        namespace: "${OBSERVABILITY_NAMESPACE}"
  values:
    prometheus:
      prometheusSpec:
        enableRemoteWriteReceiver: ${OBSERVABILITY_PROMETHEUS_REMOTE_WRITE_RECEIVER}
        enableFeatures:
          - exemplar-storage
        retention: "${OBSERVABILITY_PROMETHEUS_RETENTION}"
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: "${OBSERVABILITY_PROMETHEUS_STORAGE_CLASS}"
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: "${OBSERVABILITY_PROMETHEUS_STORAGE_SIZE}"
        nodeSelector:
          "${OBSERVABILITY_METRICS_NODE_SELECTOR_KEY}": "${OBSERVABILITY_METRICS_NODE_SELECTOR_VALUE}"
    grafana:
      enabled: false
    alertmanager:
      enabled: ${OBSERVABILITY_ALERTMANAGER_ENABLED}
