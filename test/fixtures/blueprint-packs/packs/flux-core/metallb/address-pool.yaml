apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: "${METALLB_ADDRESS_POOL_NAME}"
  namespace: "${METALLB_NAMESPACE}"
spec:
  addresses:
    - "${METALLB_ADDRESS_RANGE}"
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: "${METALLB_L2_ADVERTISEMENT_NAME}"
  namespace: "${METALLB_NAMESPACE}"
spec:
  ipAddressPools:
    - "${METALLB_ADDRESS_POOL_NAME}"
