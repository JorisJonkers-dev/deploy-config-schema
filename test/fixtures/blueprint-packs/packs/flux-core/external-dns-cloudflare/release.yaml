apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: "${EXTERNAL_DNS_RELEASE_NAME}"
  namespace: "${EXTERNAL_DNS_NAMESPACE}"
spec:
  interval: "${EXTERNAL_DNS_RELEASE_INTERVAL}"
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  chart:
    spec:
      chart: "${EXTERNAL_DNS_CHART_NAME}"
      version: "${EXTERNAL_DNS_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: "${EXTERNAL_DNS_HELM_REPOSITORY_NAME}"
        namespace: "${EXTERNAL_DNS_NAMESPACE}"
  values:
    provider:
      name: cloudflare
    sources:
      - service
      - traefik-proxy
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: "${EXTERNAL_DNS_CLOUDFLARE_TOKEN_SECRET_NAME}"
            key: "${EXTERNAL_DNS_CLOUDFLARE_TOKEN_SECRET_KEY}"
    extraArgs:
      - "--annotation-filter=${EXTERNAL_DNS_ANNOTATION_FILTER}"
      - "--domain-filter=${EXTERNAL_DNS_DOMAIN_FILTER}"
      - "--txt-owner-id=${EXTERNAL_DNS_TXT_OWNER_ID}"
    nodeSelector:
      "${EXTERNAL_DNS_NODE_SELECTOR_KEY}": "${EXTERNAL_DNS_NODE_SELECTOR_VALUE}"
