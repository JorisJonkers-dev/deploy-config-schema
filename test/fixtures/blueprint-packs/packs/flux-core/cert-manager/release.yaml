apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: "${CERT_MANAGER_RELEASE_NAME}"
  namespace: "${CERT_MANAGER_NAMESPACE}"
spec:
  interval: "${CERT_MANAGER_RELEASE_INTERVAL}"
  chart:
    spec:
      chart: "${CERT_MANAGER_CHART_NAME}"
      version: "${CERT_MANAGER_CHART_VERSION}"
      sourceRef:
        kind: HelmRepository
        name: "${CERT_MANAGER_HELM_REPOSITORY_NAME}"
        namespace: "${CERT_MANAGER_NAMESPACE}"
  values:
    crds:
      enabled: true
