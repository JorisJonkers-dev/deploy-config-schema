apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api-public
  namespace: demo
  annotations:
    external-dns.alpha.kubernetes.io/hostname: api.example.com
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`api.example.com`) && PathPrefix(`/`)
      services:
        - name: api
          port: 80
  tls:
    secretName: api-tls
