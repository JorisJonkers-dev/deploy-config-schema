apiVersion: deployment.jorisjonkers.dev
kind: Deployment
metadata:
  name: imported-fleet
  labels:
    deployment.jorisjonkers.dev/imported-from: live-fleet
spec:
  workloads:
    web-api:
      group: stateless
      namespace: apps
      kind: deployment
      replicas: 2
      serviceAccountName: web-api
      image: ghcr.io/example/web-api:v1.0.0
      pullPolicy: IfNotPresent
      containers:
        - name: web-api
          image: ghcr.io/example/web-api:v1.0.0
          ports:
            - name: http
              containerPort: 8080
          env: {}
          envFromSecrets: []
          volumeMounts:
            - volume: data
              path: /var/lib/web-api
      initContainers: []
      sidecars: []
      ports:
        - name: http
          containerPort: 8080
          servicePort: 80
      config:
        values:
          LOG_LEVEL: info
        files:
          application.yml: |
            feature: imported
      secrets:
        - name: web-api-db
          destinationSecretName: web-api-db
          envKeys:
            - uri
      credentials: []
      storage:
        volumes:
          - name: data
            kind: persistent
            size: 5Gi
            accessModes:
              - ReadWriteOnce
            storageClassName: longhorn
        mounts:
          - volume: data
            path: /var/lib/web-api
      autoscaling:
        minReplicas: 2
        maxReplicas: 4
        targetCpuUtilization: 70
      observability:
        status:
          - name: health
            group: stateless
            url: http://web-api.apps.svc.cluster.local:80/healthz
            type: http
            conditions:
              - "[STATUS] == 204"
              - "[RESPONSE_TIME] < 750"
        metrics:
          - kind: ServiceMonitor
            port: http
            path: /metrics
            interval: 30s
      routes:
        - name: web-api
          host: api.example.test
          expose:
            tier: public-frankfurt
          auth:
            scope: application
          rules:
            - path: /api
              operation: prefix
              port: http
              middleware: []
      rawManifests: []
