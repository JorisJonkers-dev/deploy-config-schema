'name': 'CI'

'on':
  'pull_request':
  'push':
    'branches':
      - 'main'
  'workflow_dispatch':

'concurrency':
  'group': 'ci-${{ github.workflow }}-${{ github.ref }}'
  'cancel-in-progress': '${{ github.ref != ''refs/heads/main'' }}'

'permissions':
  'contents': 'read'
  'packages': 'read'

'jobs':
  'node':
    'name': 'Node CI'
    'uses': 'JorisJonkers-dev/github-workflows/.github/workflows/node-ci.yml@v0.10.2'
    'with':
      'node-version': '20'
      'package-manager': 'npm'
      'install-command': 'npm ci'
      'prettier-args': 'package.json'
      'test-command': 'npm test'
      'build-command': |
        npm run build
        npm run validate:schema
        npm run validate:sample
        npm run render:sample > /tmp/traefik-ingressroutes.yaml
        test -s /tmp/traefik-ingressroutes.yaml
        node dist/bin/deploy-config-schema.js render traefik-lan samples/deploy-config.yaml > /tmp/traefik-lan-ingressroutes.yaml
        node dist/bin/deploy-config-schema.js render gatus samples/deploy-config.yaml > /tmp/gatus-endpoints-configmap.yaml
        node dist/bin/deploy-config-schema.js render edge-catalog samples/deploy-config.yaml > /tmp/edge-catalog-configmap.yaml
        node dist/bin/deploy-config-schema.js render edge-route-catalog samples/deploy-config.yaml > /tmp/edge-route-catalog-configmap.yaml
        node dist/bin/deploy-config-schema.js render image-metadata samples/deploy-config.yaml > /tmp/image-metadata.yaml
        node dist/bin/deploy-config-schema.js validate auto fixtures/deployment/*.yml
        node dist/bin/deploy-config-schema.js lock images --lock fixtures/deployment/deployment.lock.yml --format image-tags
    'secrets':
      'packages-token': '${{ secrets.GITHUB_TOKEN }}'

  'workflow-lint':
    'name': 'Workflow Lint'
    'runs-on': 'ubuntu-latest'
    'steps':
      - 'uses': 'actions/checkout@v6'
      - 'name': 'Download actionlint'
        'id': 'actionlint'
        'shell': 'bash'
        'run': 'bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)'
      - 'name': 'Lint GitHub Actions workflows'
        'shell': 'bash'
        'run': |
          "${{ steps.actionlint.outputs.executable }}" -color .github/workflows/*.yml

  'secret-scan':
    'name': 'Secret Scan'
    'runs-on': 'ubuntu-latest'
    'steps':
      - 'uses': 'actions/checkout@v6'
        'with':
          'fetch-depth': 2
      - 'name': 'Download gitleaks'
        'shell': 'bash'
        'run': |
          curl --fail --silent --show-error --location \
            'https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz' \
            --output /tmp/gitleaks.tar.gz
          mkdir -p /tmp/gitleaks
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks gitleaks
      - 'name': 'Scan repository'
        'shell': 'bash'
        'env':
          'BASE_REF': '${{ github.base_ref }}'
          'HEAD_REF': '${{ github.head_ref }}'
        'run': |
          scan_root='/tmp/gitleaks-scan'
          rm -rf "${scan_root}"
          mkdir -p "${scan_root}"

          if [ -n "${BASE_REF}" ]; then
            git fetch --no-tags origin \
              "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              "+refs/heads/${HEAD_REF}:refs/remotes/origin/${HEAD_REF}"
            range="origin/${BASE_REF}..origin/${HEAD_REF}"
          else
            range='HEAD~1...HEAD'
          fi

          git diff --name-only --diff-filter=ACMRT "${range}" | while IFS= read -r path; do
            [ -z "${path}" ] && continue
            [ -f "${path}" ] || continue
            mkdir -p "${scan_root}/$(dirname "${path}")"
            cp "${path}" "${scan_root}/${path}"
          done

          if ! find "${scan_root}" -type f | grep -q .; then
            echo 'No changed files to scan.'
            exit 0
          fi

          /tmp/gitleaks/gitleaks detect --no-git --redact --source "${scan_root}" --exit-code 1

  'pipeline-complete':
    'name': 'Pipeline Complete'
    'if': 'always()'
    'needs':
      - 'node'
      - 'workflow-lint'
      - 'secret-scan'
    'runs-on': 'ubuntu-latest'
    'steps':
      - 'uses': 're-actors/alls-green@release/v1'
        'with':
          'jobs': '${{ toJSON(needs) }}'
